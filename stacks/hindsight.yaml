# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

services:

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: hindsight-cloudflared
    command: --config /etc/cloudflared/config.yml tunnel run
    user: 568:568
    configs:
      - source: cloudflared
        target: /etc/cloudflared/config.yml
        uid: "568"
        gid: "568"
        mode: 0440
    volumes:
      - /mnt/spool/apps/config/hindsight/cloudflared:/etc/cloudflared
    restart: unless-stopped

  hindsight:
    # All-in-one image (standalone target): runs both hindsight-api on 8888 and
    # the Next.js Control Plane on 9999 via /app/start-all.sh.
    image: ghcr.io/vectorize-io/hindsight:0.5.6-slim
    container_name: hindsight
    # env_file: would be resolved at compose-parse time, which fails when
    # Portainer parses the stack inside its own container without the host
    # config dir mounted. Loading via a Docker secret defers path resolution
    # to the daemon on the host, same way `hindsight_db_password` is wired.
    # Order: docker `environment:` is set first; then the secret file is sourced
    # via `set -a` so secrets cleanly override any defaults if needed. Keep only
    # secrets in /run/secrets/hindsight_env; non-secrets live here.
    entrypoint: ["sh", "-c", "set -a; . /run/secrets/hindsight_env; set +a; exec /app/start-all.sh"]
    user: "568:568"
    secrets:
      - hindsight_env
    environment:
      # Worker identity: stable ID survives restarts so the worker can reclaim
      # its own in-progress tasks (avoids dead-worker stuck-task issue #624).
      HINDSIGHT_API_WORKER_ID: hindsight-worker-1
      # API: search backends + reverse-proxy subpath
      HINDSIGHT_API_VECTOR_EXTENSION: vchord
      HINDSIGHT_API_TEXT_SEARCH_EXTENSION: vchord
      HINDSIGHT_API_BASE_PATH: /api
      # API: default LLM (recall, reflect, consolidation) via local litellm proxy
      HINDSIGHT_API_LLM_PROVIDER: openai
      HINDSIGHT_API_LLM_BASE_URL: http://litellm:4000/v1
      HINDSIGHT_API_LLM_MODEL: gemma-4-e4b
      # DB: bump asyncpg client timeout — pgvector ANN query in retain phase 1
      # exceeded the 60 s default once the facts table grew.
      HINDSIGHT_API_DB_COMMAND_TIMEOUT: "180"
      # API: embeddings via local litellm proxy
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: openai
      HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: http://hindsight-litellm:4000/v1
      HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: text-embedding-3-small
      # API: reranker via self-hosted TEI cross-encoder on the litellm network.
      # Cohere via litellm kept in /mnt/spool/apps/config/litellm/config.yaml as
      # short-term rollback path; flip RERANKER_PROVIDER back to litellm to revert.
      HINDSIGHT_API_RERANKER_PROVIDER: tei
      HINDSIGHT_API_RERANKER_TEI_URL: http://hindsight-tei-reranker:80
      HINDSIGHT_API_RERANKER_TEI_BATCH_SIZE: "64"
      HINDSIGHT_API_RERANKER_TEI_MAX_CONCURRENT: "4"
      # API: tenant auth extension (key itself stays in secret env)
      HINDSIGHT_API_TENANT_EXTENSION: hindsight_api.extensions.builtin.tenant:ApiKeyTenantExtension
      # CP: dataplane URL (key stays in secret env)
      HINDSIGHT_CP_DATAPLANE_API_URL: http://localhost:8888/api
    expose:
      - "8888"
      - "9999"
    depends_on:
      hindsight-db:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  hindsight-db:
    image: ghcr.io/tensorchord/vchord-suite:pg18-20260401
    container_name: hindsight-db
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_preload_libraries=vchord.so,vchord_bm25.so,pg_tokenizer.so"
    # Docker default /dev/shm is 64 MB; PG parallel workers allocate shm segs
    # for hash/sort/agg and exhaust it under concurrent /stats fanout, raising
    # "could not resize shared memory segment ... No space left on device".
    shm_size: 2gb
    user: "568:568"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/hindsight_db_password
      - PGDATA=/var/lib/postgresql/data/pgdata
    configs:
      - source: hindsight-db-init
        target: /docker-entrypoint-initdb.d/01-extensions.sql
        mode: 0444
    secrets:
      - hindsight_db_password
    volumes:
      - /mnt/spool/apps/data/hindsight/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hindsight-db-backup:
    # pg_dump --format=custom with built-in daily/weekly/monthly rotation.
    # Backups land in a separate host path so a corrupt data dir can't take them.
    image: prodrigestivill/postgres-backup-local:18
    container_name: hindsight-db-backup
    user: "568:568"
    environment:
      POSTGRES_HOST: hindsight-db
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/hindsight_db_password
      POSTGRES_EXTRA_OPTS: "--format=custom --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      HEALTHCHECK_PORT: "8080"
    secrets:
      - hindsight_db_password
    volumes:
      - /mnt/spool/apps/data/hindsight/backups:/backups
    depends_on:
      hindsight-db:
        condition: service_healthy
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm-database:main-v1.83.10-stable
    container_name: hindsight-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    user: "568:568"
    environment:
      - GITHUB_COPILOT_TOKEN_DIR=/copilot-tokens
      - STORE_MODEL_IN_DB=False
      - DISABLE_ADMIN_UI=True
    volumes:
      - /mnt/spool/apps/config/hindsight/litellm/config.yaml:/app/config.yaml:ro
      - /mnt/spool/apps/config/hindsight/litellm/copilot-tokens:/copilot-tokens
    expose:
      - "4000"
    depends_on:
      hindsight-db:
        condition: service_healthy
    healthcheck:  # Defines the health check configuration for the container
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"  # Command to execute for health check
      interval: 30s  # Perform health check every 30 seconds
      timeout: 10s   # Health check command times out after 10 seconds
      retries: 3     # Retry up to 3 times if health check fails
      start_period: 40s  # Wait 40 seconds after container start before beginning health checks
    restart: unless-stopped

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.7
    container_name: hindsight-tei-reranker
    user: "568:568"
    command:
      # Primary: ModernBERT-based reranker, 8K context, beats bge-large at ~150M params.
      # Rollback: cross-encoder/ms-marco-MiniLM-L-6-v2 (Hindsight leaderboard #1, English-only,
      # 512-token cap). Swap --model-id and recreate if gte-modernbert misbehaves.
      - "--model-id=Alibaba-NLP/gte-reranker-modernbert-base"
      - "--port=80"
      - "--max-concurrent-requests=64"
      - "--max-batch-tokens=16384"
      # Hindsight ships the full candidate set in one /rerank call (200+ docs).
      # Default 2 MB body limit overflows; bump to 32 MB. `auto-truncate` caps
      # any single doc to the model's context window.
      - "--payload-limit=33554432"
      - "--auto-truncate"
      # Match Hindsight's HINDSIGHT_API_RERANKER_TEI_BATCH_SIZE (default TEI cap is 32).
      - "--max-client-batch-size=64"
    environment:
      HF_HOME: /data
    volumes:
      - /mnt/spool/apps/data/hindsight/tei/cache:/data
    expose:
      - "80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped


configs:
  hindsight-db-init:
    content: |
      CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
      CREATE EXTENSION IF NOT EXISTS pg_tokenizer CASCADE;
      CREATE EXTENSION IF NOT EXISTS vchord_bm25 CASCADE;
      -- pg_tokenizer/vchord_bm25 install into their own catalog schemas;
      -- hindsight calls tokenize() unqualified, so put both on search_path.
      ALTER DATABASE postgres SET search_path = public, tokenizer_catalog, bm25_catalog;
      -- $$$$ → $$ inside compose (compose escapes a literal $ as $$).
      SELECT tokenizer_catalog.create_tokenizer('llmlingua2', $$$$ model = "llmlingua2" $$$$);
  cloudflared:
    content: |
      tunnel: 5ebada53-82c5-40d9-baa6-030aa0d9ad75
      credentials-file: /etc/cloudflared/creds/5ebada53-82c5-40d9-baa6-030aa0d9ad75.json
      ingress:
        # Dataplane (MCP, raw v1 API, FastAPI docs) — port 8888
        - hostname: hindsight.alekseev.us
          path: ^/api/(mcp|v1|docs|redoc|openapi.json)(/.*)?$
          service: http://hindsight:8888
        # Everything else (dashboard UI + CP's own /api/* proxy routes) → CP on 9999
        - hostname: hindsight.alekseev.us
          service: http://hindsight:9999
        - hostname: hindsight-litellm.alekseev.us
          service: http://hindsight-litellm:4000
        - service: http_status:404

secrets:
  hindsight_db_password:
    file: /mnt/spool/apps/config/hindsight/secrets/db_password
  hindsight_env:
    file: /mnt/spool/apps/config/hindsight/env

networks:
  litellm:
    external: true
    name: litellm
