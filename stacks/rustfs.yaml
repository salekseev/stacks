# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

services:
  boringtun:
    image: ghcr.io/ntkme/boringtun:edge
    container_name: boringtun
    restart: unless-stopped
    cap_add:
      - MKNOD
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /dev/net/tun:/dev/net/tun
      - /mnt/spool/apps/config/rustfs/config/fly-wg0.conf:/etc/wireguard/wg0.conf:ro
    command: wg0
    dns:
      - 192.168.1.1  # local resolver to resolve gateway endpoint before tunnel is up
      - fdaa::3    # Fly.io internal DNS for .internal hostnames (reachable after tunnel)
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD-SHELL", "grep -q wg0 /proc/net/dev"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: otel-collector
    network_mode: "service:boringtun"
    restart: unless-stopped
    depends_on:
      boringtun:
        condition: service_healthy
    volumes:
      - /mnt/spool/apps/config/rustfs/config/otelcol-config.yml:/etc/otelcol-contrib/config.yaml:ro

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.93
    container_name: rustfs
    network_mode: "service:boringtun"
    restart: unless-stopped
    user: "568:568"
    security_opt:
      - "no-new-privileges:true"
    env_file:
      - stack.env
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=[::]:9000
      - RUSTFS_CONSOLE_ADDRESS=[::]:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_TLS_PATH=/config/tls
      - RUSTFS_ACCESS_KEY_FILE=/config/secrets/access_key
      - RUSTFS_SECRET_KEY_FILE=/config/secrets/secret_key
      - RUSTFS_OBS_ENDPOINT=http://localhost:4318
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_OBS_LOG_DIRECTORY=/logs
      - RUSTFS_OBS_TRACES_EXPORT_ENABLED=true
      - RUSTFS_OBS_METRICS_EXPORT_ENABLED=true
      - RUSTFS_OBS_LOGS_EXPORT_ENABLED=true
    volumes:
      - /mnt/spool/apps/config/rustfs/data:/data
      - /mnt/spool/apps/config/rustfs/logs:/logs
      - /mnt/spool/apps/config/rustfs/config:/config
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -fk https://127.0.0.1:9000/health && curl -fk https://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      boringtun:
        condition: service_healthy
      otel-collector:
        condition: service_started
        required: false

  mc:
    image: minio/mc:latest
    container_name: mc
    network_mode: "service:boringtun"
    restart: "no"
    entrypoint: ["sleep", "infinity"]
    environment:
      - MC_HOST_rustfs=https://${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}@localhost:9000
      - MC_INSECURE=true
    depends_on:
      rustfs:
        condition: service_healthy
