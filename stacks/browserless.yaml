# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

# Browserless stack with Tailscale sidecar
# This stack provides a browserless Chrome instance accessible via Tailscale
# Can be used with changedetection and openclaw
#
# Required environment variables:
#   TS_AUTHKEY - Tailscale authentication key (generate at https://login.tailscale.com/admin/settings/keys)
#
# Optional environment variables:
#   TZ - Timezone (default: America/New_York)
#   BROWSERLESS_TOKEN - API token for browserless authentication
#
# The browserless service is accessible via Tailscale at ws://browserless:3000
# or http://browserless:3000 (if using HTTP API)

services:

  # Tailscale sidecar provides secure access to browserless over Tailnet
  tailscale:
    image: tailscale/tailscale:latest
    container_name: browserless-tailscale
    hostname: browserless
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY environment variable is required}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE

  # Browserless Chrome instance for web automation
  # Shares network with Tailscale sidecar for Tailnet access
  browserless:
    image: ghcr.io/browserless/chromium:v2.42.0
    container_name: browserless
    hostname: browserless-chrome
    restart: on-failure:5
    network_mode: service:tailscale
    depends_on:
      - tailscale
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:./chrome.json
    environment:
      - TZ=${TZ:-America/New_York}
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - SCREEN_DEPTH=16
      - ENABLE_DEBUGGER=false
      - TIMEOUT=300000
      - CONCURRENT=10
      - QUEUED=10
      - ignoreHTTPSErrors=true
      - DEFAULT_STEALTH=true
      - FUNCTION_ENABLE_INCOGNITO_MODE=true
      - KEEP_ALIVE=true
      - PREBOOT_CHROME=true
      - EXIT_ON_HEALTH_FAILURE=true
      # Uncomment to set a token for API authentication
      # - TOKEN=${BROWSERLESS_TOKEN:?BROWSERLESS_TOKEN environment variable is required}

volumes:
  tailscale-state:
