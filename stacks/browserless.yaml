# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: browserless-tailscale
    hostname: browserless
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY environment variable is required}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE

  browserless:
    image: ghcr.io/browserless/chromium:v2.42.0
    container_name: browserless
    hostname: browserless-chrome
    restart: on-failure:5
    network_mode: service:tailscale
    depends_on:
      - tailscale
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:./chrome.json
    environment:
      - TZ=${TZ:-America/New_York}
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - SCREEN_DEPTH=16
      - ENABLE_DEBUGGER=false
      - TIMEOUT=300000
      - CONCURRENT=10
      - QUEUED=10
      - ignoreHTTPSErrors=true
      - DEFAULT_STEALTH=true
      - FUNCTION_ENABLE_INCOGNITO_MODE=true
      - KEEP_ALIVE=true
      - PREBOOT_CHROME=true
      - EXIT_ON_HEALTH_FAILURE=true
      # Uncomment to set a token for API authentication
      # - TOKEN=${BROWSERLESS_TOKEN:?BROWSERLESS_TOKEN environment variable is required}

volumes:
  tailscale-state:
