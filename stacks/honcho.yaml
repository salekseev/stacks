# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

# All Honcho config lives in /app/config.toml (mounted from
# /mnt/spool/apps/config/honcho/config.toml). DB password is also
# consumed via the Compose secret at /run/secrets/honcho_db_password.
# No env-var overrides — change config.toml on host + restart.

services:

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared-honcho
    command: --config /etc/cloudflared/config.yml tunnel run
    user: 568:568
    configs:
      - source: cloudflared-honcho
        target: /etc/cloudflared/config.yml
        uid: "568"
        gid: "568"
        mode: 0440
    volumes:
      - /mnt/spool/apps/config/honcho/cloudflared:/etc/cloudflared
    restart: unless-stopped

  honcho-api:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    container_name: honcho-api
    entrypoint: ["sh", "docker/entrypoint.sh"]
    user: "568:568"
    volumes:
      - /mnt/spool/apps/config/honcho/config.toml:/app/config.toml:ro
    expose:
      - "8000"
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    networks:
      - default
      - litellm
    restart: unless-stopped

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    container_name: honcho-deriver
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    user: "568:568"
    volumes:
      - /mnt/spool/apps/config/honcho/config.toml:/app/config.toml:ro
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    networks:
      - default
      - litellm
    restart: unless-stopped

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: honcho-db
    command: ["postgres", "-c", "max_connections=200"]
    user: "568:568"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/honcho_db_password
      - PGDATA=/var/lib/postgresql/data/pgdata
    secrets:
      - honcho_db_password
    volumes:
      - /mnt/spool/apps/data/honcho/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    user: "568:568"
    volumes:
      - /mnt/spool/apps/data/honcho/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

configs:
  cloudflared-honcho:
    content: |
      tunnel: 62ba6da3-af02-42aa-a5ba-1a78e764f8c2
      credentials-file: /etc/cloudflared/creds/62ba6da3-af02-42aa-a5ba-1a78e764f8c2.json
      ingress:
        - hostname: honcho.alekseev.us
          service: http://honcho-api:8000
          access:
            required: true
            teamName: alekseev
            audTag:
              - 2b215fa599c9e3d45c9f1fdb7962f96a00e58b0a2f8119c4d451514b5d6f6d7e
        - service: http_status:404

secrets:
  honcho_db_password:
    file: /mnt/spool/apps/config/honcho/secrets/db_password

networks:
  litellm:
    external: true
    name: litellm
