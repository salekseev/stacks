# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

x-honcho-env: &honcho-env
  # Connection settings — secrets (DB password, LLM key) live in /app/config.toml.
  # Everything else inline here.
  CACHE_ENABLED: "true"
  CACHE_URL: "redis://honcho-redis:6379/0?suppress=true"
  AUTH_USE_AUTH: "false"
  LOG_LEVEL: INFO

  # Route Honcho through the litellm proxy as an OpenAI-compatible endpoint.
  # In Honcho v3.0.6, provider="custom" → CLIENTS["custom"], built from
  # LLM_OPENAI_COMPATIBLE_{API_KEY,BASE_URL}. The api_key lives in config.toml.
  LLM_OPENAI_COMPATIBLE_BASE_URL: "http://litellm:4000/v1"
  # Honcho's "openrouter" embedding branch reuses OPENAI_COMPATIBLE_* and calls
  # `openai/text-embedding-3-small` — must be exposed under that exact model_name in litellm.
  LLM_EMBEDDING_PROVIDER: "openrouter"

  DERIVER_PROVIDER: "custom"
  DERIVER_MODEL: "gpt-5-mini"

  SUMMARY_PROVIDER: "custom"
  SUMMARY_MODEL: "gpt-5-mini"

  DREAM_PROVIDER: "custom"
  DREAM_MODEL: "gpt-5-mini"
  DREAM_DEDUCTION_MODEL: "gpt-5-mini"
  DREAM_INDUCTION_MODEL: "gpt-5-mini"

  # Dialectic per-level — DialecticLevelSettings uses lowercase validation aliases.
  # Defaults reproduce v3.0.6 src/config.py:359-391, with provider/model swapped to custom/gpt-5-mini.
  DIALECTIC_LEVELS__minimal__provider: "custom"
  DIALECTIC_LEVELS__minimal__model: "gpt-5-mini"
  DIALECTIC_LEVELS__minimal__thinking_budget_tokens: "0"
  DIALECTIC_LEVELS__minimal__max_tool_iterations: "1"
  DIALECTIC_LEVELS__minimal__max_output_tokens: "250"
  DIALECTIC_LEVELS__minimal__tool_choice: "any"
  DIALECTIC_LEVELS__low__provider: "custom"
  DIALECTIC_LEVELS__low__model: "gpt-5-mini"
  DIALECTIC_LEVELS__low__thinking_budget_tokens: "0"
  DIALECTIC_LEVELS__low__max_tool_iterations: "5"
  DIALECTIC_LEVELS__low__tool_choice: "any"
  DIALECTIC_LEVELS__medium__provider: "custom"
  DIALECTIC_LEVELS__medium__model: "gpt-5-mini"
  DIALECTIC_LEVELS__medium__thinking_budget_tokens: "0"
  DIALECTIC_LEVELS__medium__max_tool_iterations: "2"
  DIALECTIC_LEVELS__high__provider: "custom"
  DIALECTIC_LEVELS__high__model: "gpt-5-mini"
  DIALECTIC_LEVELS__high__thinking_budget_tokens: "0"
  DIALECTIC_LEVELS__high__max_tool_iterations: "4"
  DIALECTIC_LEVELS__max__provider: "custom"
  DIALECTIC_LEVELS__max__model: "gpt-5-mini"
  DIALECTIC_LEVELS__max__thinking_budget_tokens: "0"
  DIALECTIC_LEVELS__max__max_tool_iterations: "10"

services:

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared-honcho
    command: --config /etc/cloudflared/config.yml tunnel run
    user: 568:568
    configs:
      - source: cloudflared-honcho
        target: /etc/cloudflared/config.yml
        uid: "568"
        gid: "568"
        mode: 0440
    volumes:
      - /mnt/spool/apps/config/honcho/cloudflared:/etc/cloudflared
    restart: unless-stopped

  honcho-api:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    container_name: honcho-api
    entrypoint: ["sh", "docker/entrypoint.sh"]
    user: "568:568"
    environment:
      <<: *honcho-env
    volumes:
      - /mnt/spool/apps/config/honcho/config.toml:/app/config.toml:ro
    expose:
      - "8000"
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    networks:
      - default
      - litellm
    restart: unless-stopped

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    container_name: honcho-deriver
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    user: "568:568"
    environment:
      <<: *honcho-env
    volumes:
      - /mnt/spool/apps/config/honcho/config.toml:/app/config.toml:ro
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    networks:
      - default
      - litellm
    restart: unless-stopped

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: honcho-db
    command: ["postgres", "-c", "max_connections=200"]
    user: "568:568"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/honcho_db_password
      - PGDATA=/var/lib/postgresql/data/pgdata
    secrets:
      - honcho_db_password
    volumes:
      - /mnt/spool/apps/data/honcho/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    user: "568:568"
    volumes:
      - /mnt/spool/apps/data/honcho/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

configs:
  cloudflared-honcho:
    content: |
      tunnel: 62ba6da3-af02-42aa-a5ba-1a78e764f8c2
      credentials-file: /etc/cloudflared/creds/62ba6da3-af02-42aa-a5ba-1a78e764f8c2.json
      ingress:
        - hostname: honcho.alekseev.us
          service: http://honcho-api:8000
          access:
            required: true
            teamName: alekseev
            audTag:
              - 2b215fa599c9e3d45c9f1fdb7962f96a00e58b0a2f8119c4d451514b5d6f6d7e
        - service: http_status:404

secrets:
  honcho_db_password:
    file: /mnt/spool/apps/config/honcho/secrets/db_password

networks:
  litellm:
    external: true
    name: litellm
