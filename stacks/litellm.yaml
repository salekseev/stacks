# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

services:

  litellm:
    image: ghcr.io/berriai/litellm:v1.83.10-stable
    container_name: litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    user: "568:568"
    environment:
      - GITHUB_COPILOT_TOKEN_DIR=/copilot-tokens
      - STORE_MODEL_IN_DB=False
      - DISABLE_ADMIN_UI=True
    volumes:
      - /mnt/spool/apps/config/litellm/config.yaml:/app/config.yaml:ro
      - /mnt/spool/apps/config/litellm/copilot-tokens:/copilot-tokens
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - litellm
    restart: unless-stopped

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.7
    container_name: tei-reranker
    user: "568:568"
    command:
      - "--model-id=cross-encoder/mmarco-mMiniLMv2-L12-H384-v1"
      - "--port=80"
      - "--max-concurrent-requests=64"
      - "--max-batch-tokens=16384"
      # Hindsight ships the full candidate set in one /rerank call (200+ docs).
      # Default 2 MB body limit overflows; bump to 32 MB. `auto-truncate` caps
      # any single doc to the model's 512-token window so we don't reject batches
      # that contain one oversized fact.
      - "--payload-limit=33554432"
      - "--auto-truncate"
      # Match Hindsight's HINDSIGHT_API_RERANKER_TEI_BATCH_SIZE (default TEI cap is 32).
      - "--max-client-batch-size=64"
    environment:
      HF_HOME: /data
    volumes:
      - /mnt/spool/apps/data/tei/cache:/data
    expose:
      - "80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - litellm
    restart: unless-stopped

networks:
  litellm:
    name: litellm
